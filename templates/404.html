{% extends "base.html" %}
{% block title %}404 Page introuvable{% endblock %}
{% block page_title %}Page introuvable{% endblock %}

{% block content %}
<div style="display:flex; align-items:center; justify-content:center; min-height:60vh;">
  <div style="text-align:center; max-width:400px;">
    <div style="font-size:64px; margin-bottom:16px;">🔍</div>
    <h1 style="font-size:48px; font-weight:800; color:var(--accent); margin-bottom:8px;">404</h1>
    <h2 style="font-size:18px; font-weight:700; margin-bottom:12px; color:var(--text);">Page introuvable</h2>
    <p style="font-size:14px; color:var(--text-dim); margin-bottom:28px; line-height:1.6;">
      La page que vous cherchez n'existe pas ou a été déplacée.
    </p>
    <div style="display:flex; gap:12px; justify-content:center;">
      <a href="javascript:history.back()" class="btn btn-outline">← Retour</a>
      <a href="{{ url_for('dashboard') }}" class="btn btn-primary">Tableau de bord</a>
    </div>
  </div>
</div>
{% endblock %}
