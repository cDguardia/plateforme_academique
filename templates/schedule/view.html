{% extends "base.html" %}
{% block title %}Emploi du temps{% endblock %}
{% block page_title %}Emploi du temps{% endblock %}

{% block head %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
{% endblock %}

{% block content %}

{% if current_user.role == 'admin' %}
<div style="margin-bottom:16px;">
  <a href="{{ url_for('schedule.create') }}" class="btn btn-primary">+ Ajouter un créneau</a>
</div>
{% endif %}

<div id="calendar"></div>

<script nonce="{{ csp_nonce() }}">
document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'timeGridWeek',
        locale: 'fr',
        firstDay: 1,
        slotMinTime: '08:00:00',
        slotMaxTime: '18:00:00',
        height: 'auto',
        events: {
            url: '{{ url_for("schedule.api") }}',
            method: 'GET',
            extraParams: function() {
                var now = new Date();
                var year = now.getFullYear();
                var weekNum = getWeekNumber(now);
                return {
                    week: year + '-W' + (weekNum < 10 ? '0' : '') + weekNum
                };
            },
            failure: function() {
                alert('Erreur de chargement du calendrier.');
            }
        },
        eventClick: function(info) {
            var props = info.event.extendedProps;
            alert(
                info.event.title + '\n' +
                'Salle: ' + (props.room || 'N/A') + '\n' +
                'Professeur: ' + props.professor + '\n' +
                'Classe: ' + props.class_name
            );
        },
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },
        buttonText: {
            today: "Aujourd'hui",
            month: 'Mois',
            week: 'Semaine',
            day: 'Jour'
        }
    });
    calendar.render();
});

function getWeekNumber(d) {
    var date = new Date(d.getTime());
    date.setHours(0, 0, 0, 0);
    date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
    var week1 = new Date(date.getFullYear(), 0, 4);
    return 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000
        - 3 + (week1.getDay() + 6) % 7) / 7);
}
</script>

{% endblock %}
