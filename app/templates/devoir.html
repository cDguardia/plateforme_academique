<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devoirs à rendre</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            padding: 40px;
            color: #1a1a1a;
        }

        .status-bar {
            text-align: right;
            font-size: 0.9em;
            color: #333;
            margin-bottom: 20px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .dashboard {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            padding-bottom: 60px;
        }

        .column {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 20px;
        }

        .card {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            padding: 20px;
            border: 1px solid #e6e6e6;
        }

        .card-title {
            text-align: center;
            font-size: 1.1em;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .list-group {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .list-item {
            font-size: 0.95em;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            line-height: 1.4;
        }

        .list-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .btn-add {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            font-size: 0.9em;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        .btn-add:hover {
            background-color: #0056b3;
        }

        .main-title {
            position: absolute;
            bottom: -30px;
            right: 0;
            font-size: 4em;
            font-weight: 800;
            margin: 0;
            letter-spacing: 2px;
        }

        @media (max-width: 900px) {
            .dashboard {
                flex-direction: column;
            }
            .main-title {
                position: relative;
                text-align: right;
                bottom: 0;
                margin-top: 20px;
            }
        }

        /* Styles du tableau */
        table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid #e0e0e0;
        }

        th, td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
            border-right: 1px solid #e0e0e0;
        }

        /* Supprimer la bordure droite pour la dernière colonne */
        th:last-child, td:last-child {
            border-right: none;
        }

        /* En-tête du tableau (bleu clair avec bordure supérieure plus foncée) */
        th {
            background-color: #e6f2ff;
            border-top: 3px solid #2a52be; /* Ligne bleue au-dessus */
            font-weight: bold;
            color: #000;
        }

        /* Lignes vides en bas du tableau pour respecter la maquette */
        .empty-row td {
            height: 40px; /* Force une hauteur pour les cases vides */
        }

        /* Style des badges pour les dates (bulles grises) */
        .date-badge {
            background-color: #e6e6e6;
            padding: 6px 14px;
            border-radius: 20px;
            display: inline-block;
            font-size: 0.95em;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="status-bar">
        Devoirs 
    </div>

    <div class="dashboard">
        <div class="column">
            <div class="card">
                <h2 class="card-title">Devoirs à rendre</h2>
                <div class="list-group">
                    <div class="list-item">
                        Lundi - Histoire : DM sur la paix de Madara (2/10/2026)
                    </div>
                    <div class="list-item">
                        Lundi - Jutsu : Présentez un jutsu niveau D (2/10/2026)
                    </div>
                    <div class="list-item">
                        Mercredi - Sciences : Liste des sorts de Tsunade (4/10/2026)
                    </div>
                    <div class="list-item">
                        Jeudi - Illusions : Évasion du Sharingan (5/10/2026)
                    </div>
                </div>
            </div>
        </div>
    </div>



</body>
</html>
